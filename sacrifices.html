<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uh Corp — Sacrifices</title>
    <meta name="view-transition" content="same-origin">
    <style>
        @font-face { font-family: 'Franklin Gothic Medium'; src: url('font/framd.ttf') format('truetype'); font-weight: normal; font-style: normal; }
        @font-face { font-family: 'Franklin Gothic Medium'; src: url('font/framdit.ttf') format('truetype'); font-weight: normal; font-style: italic; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { min-height: 100vh; background: #2a2a2a; display: flex; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; position: relative; overflow: hidden; }
        .gradient-bg { position: fixed; inset: 0; z-index: 0; background: radial-gradient(ellipse 80% 60% at 20% 30%, rgba(100,60,180,0.15) 0%, transparent 60%), radial-gradient(ellipse 60% 80% at 80% 70%, rgba(60,140,200,0.12) 0%, transparent 60%), radial-gradient(ellipse 70% 50% at 50% 50%, rgba(180,80,140,0.08) 0%, transparent 60%); animation: gradientShift 12s ease-in-out infinite alternate; }
        @keyframes gradientShift { 0% { transform: scale(1) rotate(0deg); } 50% { transform: scale(1.1) rotate(2deg); } 100% { transform: scale(1) rotate(-2deg); } }
        .blob { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.3; z-index: 0; animation: blobFloat 20s ease-in-out infinite; }
        .blob:nth-child(1) { width: 400px; height: 400px; background: rgba(120,80,200,0.25); top: -10%; left: -5%; animation-duration: 22s; animation-delay: -2s; }
        .blob:nth-child(2) { width: 350px; height: 350px; background: rgba(60,160,220,0.2); bottom: -8%; right: -5%; animation-duration: 18s; animation-delay: -5s; }
        .blob:nth-child(3) { width: 250px; height: 250px; background: rgba(200,100,160,0.15); top: 50%; left: 60%; animation-duration: 25s; animation-delay: -8s; }
        .blob:nth-child(4) { width: 300px; height: 300px; background: rgba(80,200,180,0.12); top: 20%; right: 10%; animation-duration: 20s; animation-delay: -12s; }
        @keyframes blobFloat { 0% { transform: translate(0,0) scale(1); } 25% { transform: translate(40px,-60px) scale(1.1); } 50% { transform: translate(-30px,40px) scale(0.9); } 75% { transform: translate(50px,30px) scale(1.05); } 100% { transform: translate(0,0) scale(1); } }
        #morphCanvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.5; }
        .particle { position: fixed; width: 3px; height: 3px; background: rgba(255,255,255,0.15); border-radius: 50%; z-index: 1; pointer-events: none; animation: particleFloat linear infinite; }
        @keyframes particleFloat { 0% { transform: translateY(0) translateX(0); opacity: 0; } 10% { opacity: 0.6; } 50% { opacity: 0.6; } 100% { transform: translateY(-100vh) translateX(80px); opacity: 0; } }
        .sidebar { position: fixed; top: 0; left: 0; width: 240px; height: 100vh; z-index: 3; background: rgba(255,255,255,0.03); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-right: 1px solid rgba(255,255,255,0.06); display: flex; flex-direction: column; padding: 32px 24px; }
        .sidebar .brand { color: rgba(255,255,255,0.85); font-family: 'Franklin Gothic Medium','Segoe UI',system-ui,sans-serif; font-weight: normal; font-size: 1.8rem; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 40px; padding-bottom: 24px; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .sidebar nav { display: flex; flex-direction: column; gap: 4px; flex: 1; }
        .sidebar nav a { color: rgba(255,255,255,0.35); text-decoration: none; font-weight: 300; font-size: 0.9rem; padding: 10px 14px; border-radius: 8px; transition: all 0.3s ease; letter-spacing: 0.05em; }
        .sidebar nav a:hover { background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.7); }
        .sidebar nav a.active { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.8); }
        .sidebar .footer { color: rgba(255,255,255,0.2); font-size: 0.7rem; font-weight: 300; padding-top: 24px; border-top: 1px solid rgba(255,255,255,0.06); }
        .main { margin-left: 240px; flex: 1; display: flex; align-items: center; justify-content: center; position: relative; z-index: 2; min-height: 100vh; }
        .frame { position: relative; width: 640px; max-width: 42vw; aspect-ratio: 16/10; border-radius: 32px; background: rgba(255,255,255,0.03); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); display: flex; align-items: center; justify-content: center; flex-direction: column; padding: 40px; isolation: isolate; animation: fadeIn 0.5s ease-out; }
        .frame::before { content: ''; position: absolute; inset: -2px; border-radius: 34px; border: 2px solid rgba(255,255,255,0.25); mix-blend-mode: difference; pointer-events: none; z-index: -1; }
        .frame::after { content: ''; position: absolute; inset: -1px; border-radius: 33px; border: 1px solid rgba(255,255,255,0.1); pointer-events: none; z-index: -1; }
        .frame h1 { color: rgba(255,255,255,0.85); font-weight: 300; font-size: 2.5rem; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 8px; }
        .frame p { color: rgba(255,255,255,0.45); font-weight: 300; font-size: 1rem; letter-spacing: 0.08em; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }
        @keyframes fadeOut { from { opacity: 1; transform: scale(1); } to { opacity: 0; transform: scale(0.97); } }
        @view-transition { navigation: auto; }
        ::view-transition-old(root) { animation: 0.25s ease-out both fadeOut; }
        ::view-transition-new(root) { animation: 0.25s ease-in both fadeIn; }
    </style>
</head>
<body>
    <div class="gradient-bg"></div>
    <div class="blob"></div>
    <div class="blob"></div>
    <div class="blob"></div>
    <div class="blob"></div>
    <canvas id="morphCanvas"></canvas>
    <div id="particles"></div>

    <aside class="sidebar">
        <div class="brand">Uh Corp. 2</div>
        <nav>
            <a href="/" class="nav-link">Home</a>
            <a href="/leaderboards.html" class="nav-link">Leaderboards</a>
            <a href="/trading.html" class="nav-link">Trading</a>
            <a href="/shop.html" class="nav-link">Shop</a>
            <a href="/sacrifices.html" class="nav-link">Sacrifices</a>
            <a href="/giveaways.html" class="nav-link">Giveaways</a>
        </nav>
        <div class="footer">&copy; Uh Corp</div>
    </aside>

    <div class="main">
        <div class="frame">
            <h1>Sacrifices</h1>
            <p>offerings</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('morphCanvas');
        const ctx = canvas.getContext('2d');
        let w, h;
        function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
        resize();
        window.addEventListener('resize', resize);
        class MorphShape {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * w; this.y = Math.random() * h;
                this.radius = 30 + Math.random() * 80;
                this.sides = 4 + Math.floor(Math.random() * 6);
                this.rotation = Math.random() * Math.PI * 2;
                this.speed = 0.1 + Math.random() * 0.2;
                this.driftX = (Math.random() - 0.5) * 0.3;
                this.driftY = (Math.random() - 0.5) * 0.3;
                this.morphSpeed = 0.002 + Math.random() * 0.004;
                this.morphAmount = 0.15 + Math.random() * 0.25;
                this.morphPhase = Math.random() * Math.PI * 2;
                this.hue = 240 + Math.random() * 120;
                this.alpha = 0.04 + Math.random() * 0.06;
                this.time = 0;
            }
            update() {
                this.time += this.morphSpeed;
                this.x += this.driftX; this.y += this.driftY;
                this.rotation += this.speed * 0.005;
                if (this.x < -100) this.x = w + 100;
                if (this.x > w + 100) this.x = -100;
                if (this.y < -100) this.y = h + 100;
                if (this.y > h + 100) this.y = -100;
            }
            draw() {
                const points = this.sides;
                const angleStep = (Math.PI * 2) / points;
                const morph = Math.sin(this.time) * this.morphAmount;
                ctx.beginPath();
                for (let i = 0; i <= points; i++) {
                    const angle = this.rotation + i * angleStep;
                    const r = this.radius * (1 + morph * Math.sin(this.time * 2 + i * 1.5));
                    const px = this.x + Math.cos(angle) * r;
                    const py = this.y + Math.sin(angle) * r;
                    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.fillStyle = `hsla(${this.hue + Math.sin(this.time) * 20}, 60%, 60%, ${this.alpha})`;
                ctx.fill();
            }
        }
        const shapes = [];
        for (let i = 0; i < 12; i++) shapes.push(new MorphShape());
        function animate() {
            ctx.clearRect(0, 0, w, h);
            shapes.forEach(s => { s.update(); s.draw(); });
            requestAnimationFrame(animate);
        }
        animate();
        const container = document.getElementById('particles');
        for (let i = 0; i < 40; i++) {
            const el = document.createElement('div');
            el.className = 'particle';
            el.style.left = (Math.random() * 100) + '%';
            el.style.top = (Math.random() * 100) + '%';
            const size = 1 + Math.random() * 2;
            el.style.width = size + 'px';
            el.style.height = size + 'px';
            el.style.animationDuration = (15 + Math.random() * 15) + 's';
            el.style.animationDelay = (Math.random() * 20) + 's';
            container.appendChild(el);
        }
        const page = window.location.pathname.split('/').pop() || 'index.html';
        document.querySelectorAll('.nav-link').forEach(a => {
            const href = a.getAttribute('href').split('/').pop() || 'index.html';
            if (href === page) a.classList.add('active');
        });
    </script>
</body>
</html>
